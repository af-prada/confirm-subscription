<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subscription Confirmed</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    body {
      min-height: 100dvh;
      background-color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 1.5rem;
    }

    .card {
      text-align: center;
      max-width: 480px;
      width: 100%;
    }

    .check-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background-color: #f0faf4;
      animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
    }

    .check-wrap svg {
      width: 36px;
      height: 36px;
      stroke: #1a7f4b;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .check-path {
      stroke-dasharray: 30;
      stroke-dashoffset: 30;
      animation: draw 0.35s ease 0.3s forwards;
    }

    @keyframes pop {
      0%   { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1);   opacity: 1; }
    }

    @keyframes draw {
      to { stroke-dashoffset: 0; }
    }

    .message-en {
      font-size: clamp(1.1rem, 1rem + 0.75vw, 1.35rem);
      font-weight: 700;
      color: #000000;
      line-height: 1.4;
    }

    .message-es {
      font-size: clamp(1.1rem, 1rem + 0.75vw, 1.35rem);
      font-weight: 400;
      color: #000000;
      line-height: 1.4;
      margin-top: 0.5rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="check-wrap">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <polyline class="check-path" points="4,13 9,18 20,7"/>
      </svg>
    </div>
    <p class="message-en">Please check your email and confirm your subscription, thank you!</p>
    <p class="message-es">(Por favor revisa tu correo y confirma tu suscripción, gracias!)</p>
  </div>
</body>
</html>
